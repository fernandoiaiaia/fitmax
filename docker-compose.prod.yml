version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fitmax_api_prod
    restart: unless-stopped
    ports:
      - "3333:3333"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: fitmax_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitmax
      POSTGRES_PASSWORD: fitmax_prod_password # Change this in production
      POSTGRES_DB: fitmax
    ports:
      - "5432:5432"
    volumes:
      - fitmax_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitmax -d fitmax"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitmax_redis_prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fitmax_redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  fitmax_pgdata_prod:
  fitmax_redisdata_prod:
