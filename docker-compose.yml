version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitmax_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitmax
      POSTGRES_PASSWORD: fitmax123
      POSTGRES_DB: fitmax
    ports:
      - "5432:5432"
    volumes:
      - fitmax_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitmax -d fitmax"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fitmax_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - fitmax_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fitmax_pgdata:
  fitmax_redisdata:
